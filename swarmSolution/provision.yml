---
- name: Provisionamento Reativo do Docker Swarm Multi-Região
  hosts: all
  become: yes
  tasks:
    - name: Instalar dependencias e Docker
      apt:
        name: [curl, apt-transport-https, ca-certificates]
        state: present
        update_cache: yes

    - name: Instalar Docker oficial
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    # ==========================================
    # LÓGICA DO MANAGER (Primário ou Secundário)
    # ==========================================
    - name: Bloco do Manager
      when: role == 'manager'
      block:
        - name: Verificar se ja e parte do Swarm
          shell: 'docker info | grep "Swarm: active"'
          register: swarm_status
          failed_when: false
          changed_when: false

        # SE NÃO HÁ TOKEN FORNECIDO: Ele é o LÍDER PRIMÁRIO da infraestrutura
        - name: Inicializar Swarm (Líder Primário)
          command: docker swarm init --listen-addr 0.0.0.0:2377 --advertise-addr {{ local_ip }}:2377
          when: swarm_status.rc != 0 and (token is not defined or token == "")

        # SE HÁ TOKEN FORNECIDO: Ele é um MANAGER SECUNDÁRIO que se junta ao cluster existente
        - name: Juntar ao Swarm como Manager Secundário
          command: "docker swarm join --token {{ token }} {{ manager_ip }}:2377"
          when: swarm_status.rc != 0 and token is defined and token != ""

        - name: Obter token de worker
          command: docker swarm join-token worker -q
          register: worker_token
        
        - name: Obter token de manager
          command: docker swarm join-token manager -q
          register: manager_token
        
        - name: Gravar Estado (PUT) na API do Orchestrator Local
          uri:
            url: "http://10.0.2.2:5000/api/cluster/state" # 10.0.2.2 aponta para o Host no Vagrant NAT
            method: PUT
            body_format: json
            body: 
              manager_ip: "{{ local_ip }}"
              worker_token: "{{ worker_token.stdout }}"
              manager_token: "{{ manager_token.stdout }}"

    # ==========================================
    # LÓGICA DO WORKER
    # ==========================================
    - name: Bloco do Worker
      when: role == 'worker'
      block:
        - name: Verificar se ja e Worker
          shell: 'docker info | grep "Swarm: active"'
          register: worker_status
          failed_when: false
          changed_when: false

        # Caso o Manager Local ainda esteja a subir, aguarda o token do orchestrator local
        - name: Aguardar que o Token do Swarm esteja disponível na API Local
          uri:
            url: "http://10.0.2.2:5000/api/cluster/state"
            method: GET
            return_content: yes
          register: api_cluster_state
          until: "api_cluster_state.json.worker_token is defined and api_cluster_state.json.worker_token != ''"
          retries: 40
          delay: 5
          when: worker_status.rc != 0

        - name: Juntar ao Cluster como Worker
          command: "docker swarm join --token {{ api_cluster_state.json.worker_token }} {{ manager_ip }}:2377"
          when: worker_status.rc != 0
  
    # ==========================================
    # NOTIFICAÇÃO DE FINALIZAÇÃO (Bate sempre no Orchestrator Local)
    # ==========================================
    - name: Notificar API que o nó está provisionado
      uri:
        url: "http://10.0.2.2:5000/api/nodes/{{ ansible_hostname | regex_replace('swarm-node-', '') }}/status"
        method: PUT
        body_format: json
        body:
          status: "provisioned"
          role: "{{ role }}"