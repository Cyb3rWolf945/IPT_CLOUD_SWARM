# ================================================================
# Docker Compose — Phase 2: Containerized HA Infrastructure
# Usage: docker compose -f docker/docker-compose.yml up -d
#        docker compose -f docker/docker-compose.yml up -d --scale web=2 --scale websocket=2
# ================================================================

# ─── Networks ────────────────────────────────────────────────────
networks:
  ipt_cloud_net:
    driver: overlay
    ipam:
      config:
        - subnet: 10.77.0.0/16

# ─── Volumes ─────────────────────────────────────────────────────
volumes:
  minio_data:
  loki_data:
  grafana_data:
  portainer_data:

# ─── Services ────────────────────────────────────────────────────
services:

  # ==================================================================
  # TIER: Consul Cluster
  # ==================================================================
  consul:
    image: hashicorp/consul:1.18
    hostname: "consul-{{.Task.Slot}}"
    networks:
      ipt_cloud_net:
        aliases:
          - consul
    volumes:
      - /consul/data
      - ./configs/consul.hcl:/consul/config/consul.hcl:ro
    environment:
      CONSUL_LOCAL_CONFIG: '{"bootstrap_expect": 3, "server": true}'
      CONSUL_BIND_INTERFACE: 'eth0'
    command: /bin/sh -c "consul agent -config-file=/consul/config/consul.hcl -bind=$$(hostname -i | awk '{print $$1}') -client=0.0.0.0"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      restart_policy:
        condition: on-failure

  # ==================================================================
  # TIER: Database Cluster
  # ==================================================================
  db:
    image: ipt_cloud/patroni:latest
    hostname: "db-{{.Task.Slot}}"
    networks:
      ipt_cloud_net:
        aliases:
          - db
    volumes:
      - /var/lib/postgresql/data
    environment:
      HOSTNAME: "db-{{.Task.Slot}}"
      PATRONI_SCOPE: project_o_cluster
      PATRONI_NAMESPACE: /db/
      PATRONI_RESTAPI_PORT: "8008"
      CONSUL_HOST: tasks.consul
      CONSUL_PORT: "8500"
      DB_USER: app_user
      DB_PASS: app_password
      REPLICATOR_PASS: replicator_pass
      PG_DATA_DIR: /var/lib/postgresql/data
      PG_BIN_DIR: /usr/lib/postgresql/14/bin
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  # ==================================================================
  # TIER: HAProxy — Database Routing (health-checks Patroni primary)
  # ==================================================================
  haproxy:
    image: haproxy:2.9-alpine
    hostname: "haproxy-{{.Task.Slot}}"
    networks:
      ipt_cloud_net:
        aliases:
          - haproxy
    volumes:
      - ./configs/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5000:5000"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  # ==================================================================
  # TIER: PgBouncer Connection Poolers
  # ==================================================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    hostname: "pgbouncer-{{.Task.Slot}}"
    networks:
      ipt_cloud_net:
        aliases:
          - pgbouncer
    environment:
      DB_HOST: haproxy
      DB_PORT: "5000"
      DB_USER: postgres
      DB_PASSWORD: app_password
      DB_NAME: "*"
    volumes:
      - ./configs/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./configs/pgbouncer-users.txt:/etc/pgbouncer/userlist.txt:ro
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  # ==================================================================
  # TIER: Redis Sentinel Cluster
  # ==================================================================
  redis-master:
    image: redis:7-alpine
    hostname: redis-master
    networks:
      ipt_cloud_net:
        aliases:
          - redis-master
    volumes:
      - /data
      - ./configs:/configs:ro
    command: /bin/sh -c "cp /configs/redis-master.conf /data/redis.conf && redis-server /data/redis.conf"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis-replica:
    image: redis:7-alpine
    hostname: "redis-replica-{{.Task.Slot}}"
    networks:
      ipt_cloud_net:
        aliases:
          - redis-replica
    volumes:
      - /data
      - ./configs:/configs:ro
    command: /bin/sh -c "cp /configs/redis-replica.conf /data/redis.conf && redis-server /data/redis.conf"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  sentinel:
    image: redis:7
    hostname: "sentinel-{{.Task.Slot}}"
    networks:
      ipt_cloud_net:
        aliases:
          - sentinel
    volumes:
      - ./configs/sentinel-entrypoint.sh:/entrypoint.sh:ro
      - ./configs/sentinel.conf.template:/usr/local/etc/redis/sentinel.conf.template:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  # ==================================================================
  # TIER: Web Application (Apache + PHP)
  # ==================================================================
  web:
    image: ipt_cloud/php-app:latest
    networks:
      ipt_cloud_net:
        aliases:
          - web
    environment:
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_NAME: project_o
      DB_USER: app_user
      DB_PASS: app_password
      WS_HOST: nginx
      WS_PORT: "80"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  # ==================================================================
  # TIER: WebSocket Server
  # ==================================================================
  websocket:
    image: ipt_cloud/ratchet-ws:latest
    networks:
      ipt_cloud_net:
        aliases:
          - websocket
    environment:
      SENTINEL_HOSTS: tasks.sentinel:26379
      REDIS_PASSWORD: redispass
      REDIS_MASTER_NAME: mymaster
      WS_PORT: "8000"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  # ==================================================================
  # TIER: Nginx Reverse Proxy
  # ==================================================================
  nginx:
    image: nginx:1.25-alpine
    hostname: "nginx-{{.Task.Slot}}"
    networks:
      ipt_cloud_net:
        aliases:
          - nginx
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  # ==================================================================
  # TIER: MinIO Object Storage
  # ==================================================================
  minio:
    image: minio/minio:latest
    hostname: minio
    networks:
      ipt_cloud_net:
        aliases:
          - minio
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ipt_cloud_2026
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    networks:
      - ipt_cloud_net
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ipt_cloud_2026
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 admin ipt_cloud_2026;
      mc mb myminio/gallery --ignore-existing;
      mc anonymous set download myminio/gallery;
      echo 'MinIO bucket gallery ready';
      exit 0;
      "
    restart: "no"

  # ==================================================================
  # TIER: Monitoring
  # ==================================================================
  netdata:
    image: netdata/netdata:latest
    hostname: netdata
    networks:
      ipt_cloud_net:
        aliases:
          - netdata
    environment:
      NETDATA_CLAIM_TOKEN: ipt_cloud_2026
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    cap_add:
      - SYS_PTRACE
    ports:
      - "19999:19999"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    networks:
      - ipt_cloud_net
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    deploy:
      replicas: 1

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    hostname: "cadvisor-{{.Task.Slot}}"
    networks:
      - ipt_cloud_net
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      mode: global


  # ==================================================================
  # TIER: Logging Stack
  # ==================================================================
  loki:
    image: grafana/loki:2.9.10
    hostname: loki
    networks:
      ipt_cloud_net:
        aliases:
          - loki
    volumes:
      - loki_data:/loki
      - ./configs/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    networks:
      ipt_cloud_net:
        aliases:
          - grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./configs/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./configs/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports:
      - "3000:3000"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.10
    hostname: promtail
    networks:
      - ipt_cloud_net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./configs/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  # ==================================================================
  # TIER: Management
  # ==================================================================
  portainer:
    image: portainer/portainer-ce:latest
    hostname: portainer
    networks:
      ipt_cloud_net:
        aliases:
          - portainer
    ports:
      - "9002:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
