---
- name: Instalar HAProxy
  apt:
    name: haproxy
    state: present

- name: Copiar config do HAProxy
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
  notify: restart haproxy

- name: Garantir que o HAProxy arranca
  service:
    name: haproxy
    state: started
    enabled: yes