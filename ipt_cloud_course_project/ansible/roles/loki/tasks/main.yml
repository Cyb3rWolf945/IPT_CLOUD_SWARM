---
- name: Create Loki user and group
  user:
    name: loki
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create Loki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: loki
    group: loki
    mode: '0755'
  loop:
    - /opt/loki
    - /etc/loki
    - /var/lib/loki
    - /var/log/loki

- name: Download Loki binary
  get_url:
    url: https://github.com/grafana/loki/releases/download/v2.9.10/loki-linux-amd64.zip
    dest: /tmp/loki.zip
    mode: '0644'

- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Extract Loki binary
  unarchive:
    src: /tmp/loki.zip
    dest: /opt/loki/
    remote_src: yes
    creates: /opt/loki/loki-linux-amd64
  notify: restart loki

- name: Link Loki binary
  file:
    src: /opt/loki/loki-linux-amd64
    dest: /usr/local/bin/loki
    state: link
    owner: loki
    group: loki
    mode: '0755'

- name: Configure Loki
  template:
    src: loki-config.yml.j2
    dest: /etc/loki/loki-config.yml
    owner: loki
    group: loki
    mode: '0644'
  notify: restart loki

- name: Install Loki systemd unit
  copy:
    dest: /etc/systemd/system/loki.service
    content: |
      [Unit]
      Description=Loki — log aggregation system
      Documentation=https://grafana.com/docs/loki/latest/
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=loki
      Group=loki
      ExecStart=/usr/local/bin/loki -config.file=/etc/loki/loki-config.yml
      Restart=always
      RestartSec=5
      LimitNOFILE=65536
      StandardOutput=file:/var/log/loki/loki.log
      StandardError=file:/var/log/loki/loki.log

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: '0644'
  notify: restart loki

- name: Ensure Loki is running and enabled
  systemd:
    name: loki
    daemon_reload: yes
    state: started
    enabled: yes
