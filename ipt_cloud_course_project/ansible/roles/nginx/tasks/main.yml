---
- name: Instalar Nginx
  apt:
    name: nginx
    state: present

- name: Copiar config do Nginx
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
  notify: restart nginx

- name: Garantir que o Nginx arranca
  service:
    name: nginx
    state: started
    enabled: yes