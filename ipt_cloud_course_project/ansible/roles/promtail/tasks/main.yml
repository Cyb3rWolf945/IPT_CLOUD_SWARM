---
- name: Create Promtail user and group
  user:
    name: promtail
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create Promtail directories
  file:
    path: "{{ item }}"
    state: directory
    owner: promtail
    group: promtail
    mode: '0755'
  loop:
    - /opt/promtail
    - /etc/promtail
    - /var/lib/promtail

- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Download Promtail binary
  get_url:
    url: https://github.com/grafana/loki/releases/download/v2.9.10/promtail-linux-amd64.zip
    dest: /tmp/promtail.zip
    mode: '0644'

- name: Extract Promtail binary
  unarchive:
    src: /tmp/promtail.zip
    dest: /opt/promtail/
    remote_src: yes
    creates: /opt/promtail/promtail-linux-amd64
  notify: restart promtail

- name: Link Promtail binary
  file:
    src: /opt/promtail/promtail-linux-amd64
    dest: /usr/local/bin/promtail
    state: link
    owner: promtail
    group: promtail
    mode: '0755'

- name: Configure Promtail
  template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/promtail-config.yml
    owner: promtail
    group: promtail
    mode: '0644'
  notify: restart promtail

- name: Add Promtail to adm group (read syslog/auth.log)
  user:
    name: promtail
    groups: adm
    append: yes

- name: Install Promtail systemd unit
  copy:
    dest: /etc/systemd/system/promtail.service
    content: |
      [Unit]
      Description=Promtail — log shipping agent
      Documentation=https://grafana.com/docs/loki/latest/clients/promtail/
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=promtail
      Group=promtail
      ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/promtail-config.yml
      Restart=always
      RestartSec=5
      LimitNOFILE=65536
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: '0644'
  notify: restart promtail

- name: Ensure Promtail is running and enabled
  systemd:
    name: promtail
    daemon_reload: yes
    state: started
    enabled: yes
